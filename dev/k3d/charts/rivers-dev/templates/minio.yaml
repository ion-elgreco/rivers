apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          imagePullPolicy: IfNotPresent
          args: [server, /data]
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.rootPassword | quote }}
          ports:
            - containerPort: 9000
              name: s3
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        # Converges the bucket on every pod start (a fresh PVC starts empty);
        # a helm hook can't do this — the tolerated 15s --wait timeout in the
        # dev helmfile marks the upgrade failed and skips post-upgrade hooks.
        - name: ensure-bucket
          image: {{ .Values.minio.mcImage }}
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              until mc alias set myminio http://127.0.0.1:9000 {{ .Values.minio.rootUser }} {{ .Values.minio.rootPassword }}; do
                sleep 2
              done
              mc mb --ignore-existing myminio/{{ .Values.minio.bucket }}
              sleep infinity
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
# A restart used to wipe the volume-less /data (and the bucket with it),
# failing every run until a manual re-create.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: minio
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: minio
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: s3
      name: s3
  selector:
    app.kubernetes.io/name: minio
