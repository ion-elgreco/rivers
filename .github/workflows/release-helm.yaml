name: release-helm

# Publishes the rivers + rivers-crds Helm charts to ghcr.io as OCI artifacts
# on tag push (v*.*.*). The chart `version` and `appVersion` are overridden
# at package time to match the git tag — Chart.yaml stays at a placeholder
# so we don't have to bump it on every release.
#
# One-time setup required outside this workflow:
# - After the first push, flip the package visibility to public on GitHub
#   (Settings → Packages → charts/rivers, charts/rivers-crds → Change
#   visibility).
# - Add a tag protection ruleset matching `v*` so only authorized actors
#   can create release tags.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

# Releases must run to completion — never cancel an in-flight publish.
# `group` keys per-tag so two different tags can release in parallel
# (rare, but legitimate when patching multiple supported lines).
concurrency:
  group: release-helm-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-helm:
    name: Package and publish Helm charts
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout chart sources
      packages: write      # push OCI helm artifacts to ghcr.io
      id-token: write      # OIDC for Sigstore signing via attest-build-provenance
      attestations: write  # publish SLSA provenance to repo attestation log

    env:
      REGISTRY: ghcr.io

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Resolve release version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        env:
          # Pass via env, not run-block interpolation — keeps secrets out
          # of the rendered shell command and avoids any chance of
          # metacharacter injection from contextual values.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.actor }}
        run: |
          echo "${GH_TOKEN}" | helm registry login "${REGISTRY}" --username "${GH_USER}" --password-stdin

      - name: Update chart dependencies
        run: helm dependency update deploy/helm/rivers

      - name: Package charts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist/charts
          helm package deploy/helm/rivers-crds \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination dist/charts
          helm package deploy/helm/rivers \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination dist/charts
          ls -la dist/charts

      - name: Push charts to ghcr.io
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          owner_lc="${OWNER,,}"
          for chart in dist/charts/*.tgz; do
            helm push "${chart}" "oci://${REGISTRY}/${owner_lc}/charts"
          done

      - name: Attest chart provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/charts/*.tgz"

      - name: Log out of ghcr.io
        if: always()
        run: helm registry logout "${REGISTRY}" || true
