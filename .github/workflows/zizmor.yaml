name: zizmor

# Static analysis of our GitHub Actions workflows. Catches regressions in the
# security hardening (unpinned actions, impostor commits, dangerous triggers,
# overly broad permissions) on every PR — without this, drift creeps in over
# time as someone copy-pastes a tag-pinned snippet from an example.

on:
  merge_group:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read  # checkout workflow files; no SARIF upload, so no security-events: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Skip the GitHub Code Scanning SARIF upload — code scanning
          # isn't enabled for this repo and we only care about the
          # workflow-audit pass/fail signal in the Actions log.
          advanced-security: false
