name: python_build

on:
  merge_group:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (PR pushes, force-pushes, rapid main
# commits). Release workflows opt out of this — see release-*.yaml.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Default to no permissions; each job opts in to whatever it actually needs.
# Limits the blast radius if a step (or a transitively-pulled action) is ever
# compromised — without this, jobs inherit the org/repo default which is
# usually contents:write and can push tags, labels, releases, etc.
permissions: {}

defaults:
  run:
    working-directory: python

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  # sccache silently no-ops when CARGO_INCREMENTAL=1 (its default). Force
  # it off so `cargo test` and `maturin develop` (both dev-profile builds)
  # actually route through sccache.
  CARGO_INCREMENTAL: "0"
  # Selects [profile.ci] from Cargo.toml for `just develop` / `just test-rust`
  # — disables incremental, bumps deps to opt-level=3, strips debuginfo.
  PROFILE: "ci"

jobs:
  linting:
    name: Python linting (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: setup venv
        run: just venv

      - name: Run linting (ruff, typos, pyright)
        run: just pre-commit-check

  rust-testing:
    name: Rust tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Run Rust tests
        working-directory: .
        run: just test-rust

      - name: Run rivers-ui WASM browser tests
        working-directory: .
        # GitHub's ubuntu image ships chromedriver at $CHROMEWEBDRIVER but
        # wasm-bindgen-cli's test runner reads $CHROMEDRIVER (different name)
        # or falls back to PATH. Bridge the two so `wasm-pack test --chrome`
        # finds the driver.
        run: |
          export CHROMEDRIVER="$CHROMEWEBDRIVER/chromedriver"
          just wasm-test

  testing:
    name: Python tests (${{ matrix.label }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
    # disable sscache for windows builds
    env:
      RUSTC_WRAPPER: ${{ matrix.runner != 'windows-latest' && 'sccache' || '' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: linux-glibc-x86_64, runner: ubuntu-latest, python-version: "3.10" }
          - { label: linux-glibc-x86_64, runner: ubuntu-latest, python-version: "3.13" }
          - { label: linux-glibc-arm64, runner: ubuntu-24.04-arm, python-version: "3.13" }
          - { label: macos-arm64, runner: macos-15, python-version: "3.13" }
          - { label: windows-x86_64, runner: windows-latest, python-version: "3.13" }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build and install rivers
        # Python tests don't need the release UI bundle; develop-fast
        # builds the WASM dev-profile to save a few seconds in CI.
        run: just develop-fast

      - name: Run tests
        run: just test

  k8s-integration:
    name: K8s integration (k3d)
    # End-to-end coverage of the gRPC → daemon → operator → executor-pod →
    # SurrealDB path — the only CI job that exercises the real Kubernetes stack.
    # Runs on every PR: warm-cache runs finish in ~20-30 min, inside the rest
    # of the matrix's envelope. The 60-min ceiling is a hang-catcher, not
    # pacing — cold-cache runs (first ever, or a Cargo.lock bump) legitimately
    # need ~45 min, and killing one would also lose the cache save that makes
    # the next run fast. Push-to-main runs double as the cache primer PR runs
    # restore from. Native arm64 runner so the arm64-pinned build/image flow
    # needs no changes.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    permissions:
      contents: read
    # This job drives docker/k3d/helm from the repo root — override the
    # workflow-wide `working-directory: python` default.
    defaults:
      run:
        working-directory: .
    env:
      # Lean deploy: the suite never touches the UI or the demo code-location,
      # so skip building/importing/deploying them (drops the UI server binary,
      # its image, the demo image, and their rollouts).
      RIVERS_K8S_SKIP_UI: "1"
      RIVERS_K8S_SKIP_DEMO: "1"
      # Let `helmfile sync` actually wait for operator + storage readiness so
      # the deploy is deterministic (local dev uses a tight fast-fail timeout).
      RIVERS_HELMFILE_TIMEOUT: "300"
      # A missing/broken cluster must fail the job, never skip to green.
      RIVERS_K8S_REQUIRE_CLUSTER: "1"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # k3d + a full Rust target dir + several images are disk-hungry; drop
      # large preinstalled toolchains we don't use to avoid a mid-run ENOSPC.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/powershell || true
          df -h /

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          # cargo-zigbuild + zig cross-linker for the linux-target operator/wheel build.
          cross_compile: "true"

      - name: Install k3d + helmfile
        env:
          K3D_VERSION: "5.9.0" # keep in sync with mise.toml
          HELMFILE_VERSION: "1.5.2" # keep in sync with mise.toml
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          # Pinned release binaries — no `curl | bash` installer.
          curl -fsSL -o "$tmp/k3d" \
            "https://github.com/k3d-io/k3d/releases/download/v${K3D_VERSION}/k3d-linux-arm64"
          sudo install -m 0755 "$tmp/k3d" /usr/local/bin/k3d
          curl -fsSL -o "$tmp/helmfile.tgz" \
            "https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION}_linux_arm64.tar.gz"
          tar -xzf "$tmp/helmfile.tgz" -C "$tmp" helmfile
          sudo install -m 0755 "$tmp/helmfile" /usr/local/bin/helmfile
          # helm + kubectl ship on GitHub runners; install pinned fallbacks if absent.
          if ! command -v helm >/dev/null 2>&1; then
            curl -fsSL -o "$tmp/helm.tgz" "https://get.helm.sh/helm-v3.16.4-linux-arm64.tar.gz"
            tar -xzf "$tmp/helm.tgz" -C "$tmp"
            sudo install -m 0755 "$tmp/linux-arm64/helm" /usr/local/bin/helm
          fi
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -fsSL -o "$tmp/kubectl" "https://dl.k8s.io/release/v1.31.4/bin/linux/arm64/kubectl"
            sudo install -m 0755 "$tmp/kubectl" /usr/local/bin/kubectl
          fi
          k3d version && helmfile version && helm version --short && kubectl version --client

      # The external images (MinIO, SurrealDB) come from Docker Hub, whose
      # unauthenticated per-IP rate limits are a flake source on shared runner
      # IPs at every-PR cadence. Cache them as a tarball: on a hit the job
      # never contacts Docker Hub (setup.sh only pulls images missing
      # locally). The static key doubles as a version pin — bump the -v1
      # suffix to pick up newer upstream tags.
      - name: Restore external image cache
        id: image-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/rivers-ext-images.tar
          key: rivers-ext-images-arm64-v1

      - name: Load cached external images
        if: steps.image-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/rivers-ext-images.tar

      # Create the venv up front: `just k8s-up`'s wheel build points maturin at
      # $VIRTUAL_ENV for interpreter discovery, and the test run needs it too.
      - name: Create test venv
        run: just venv

      - name: Build images, create cluster, deploy
        run: just k8s-up

      # Written on cache miss only; actions/cache's post step uploads it at
      # job end (on success — a red cold run re-pulls next time, that's fine).
      - name: Package external images for cache
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: |
          docker save -o /tmp/rivers-ext-images.tar \
            minio/mc:latest minio/minio:latest surrealdb/surrealdb:v3

      - name: Wait for the stack to be ready
        run: just k8s-wait

      # The kubernetes suite never imports rivers itself, but the shared root
      # conftest does — install the wheel we just built for the image so the
      # host venv can import it (no separate `just develop` build needed).
      - name: Install rivers wheel into the test venv
        run: uv pip install --python .venv/bin/python dist/*.whl

      - name: Run k8s integration tests
        run: just k8s-test

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          set +e
          echo "=== pods ===";          kubectl -n rivers get pods -o wide
          echo "=== codelocations ==="; kubectl -n rivers get codelocations -o wide
          echo "=== runs ===";          kubectl -n rivers get runs -o wide
          echo "=== operator logs ==="; kubectl -n rivers logs deploy/rivers-operator --tail=200
          echo "=== recent events ==="; kubectl -n rivers get events --sort-by=.lastTimestamp | tail -60
