name: release-python

# Builds the rivers Python wheels for all supported platforms and
# publishes to PyPI via Trusted Publishing on tag push (v*.*.*).
#
# Wheels are abi3-py310, so one wheel per (os, libc, arch) covers
# Python 3.10+. Platforms: linux-gnu/{x86_64, aarch64} (manylinux_2_17),
# linux-musl/{x86_64, aarch64} (musllinux_1_2), macos/{x86_64, arm64},
# windows/x86_64.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: release-python-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  # WASM is platform-independent — build once on Linux, reuse across
  # per-OS wheel jobs. The python crate's ssr-gated `include_bytes!`s
  # on `rust/rivers-ui/pkg/` would fail without it.
  build-wasm:
    name: Build hydration WASM bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup environment (no cache — release builds run from fresh state)
        uses: ./.github/actions/setup-env
        with:
          cache: "false"

      - name: Build rivers-ui hydration WASM
        run: just wasm

      - name: Upload WASM bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rivers-ui-pkg
          path: rust/rivers-ui/pkg/
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Build wheel (linux ${{ matrix.libc }} ${{ matrix.arch }})
    needs: build-wasm
    # aarch64 builds run on native arm runners — cross-compiling aws-lc-sys
    # (pulled in by rustls via surrealdb + kube) through manylinux's
    # bundled cross-gcc reliably fails on bcm.c.
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read       # checkout sources
      id-token: write      # OIDC for Sigstore signing via attest-build-provenance
      attestations: write  # publish SLSA provenance to repo attestation log

    strategy:
      fail-fast: true
      matrix:
        include:
          # glibc — covers most distros from 2019+ (Debian 10+, Ubuntu
          # 18.10+, RHEL 8+). manylinux2014 (glibc 2.17) is shelved
          # because its CentOS 7 base only ships clang 3.4, which is too
          # old for surrealdb-librocksdb-sys's bindgen build.
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            libc: gnu
            manylinux: "2_28"
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            libc: gnu
            manylinux: "2_28"
            runner: ubuntu-24.04-arm
          # musl — covers Alpine and other distroless/musl-based images.
          - target: x86_64-unknown-linux-musl
            arch: x86_64
            libc: musl
            manylinux: musllinux_1_2
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            arch: aarch64
            libc: musl
            manylinux: musllinux_1_2
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set release version
        uses: ./.github/actions/set-release-version
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Download WASM bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rivers-ui-pkg
          path: rust/rivers-ui/pkg/

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
          sccache: false
          # rivers-api needs protoc at build time (prost-build);
          # surrealdb-librocksdb-sys needs libclang.so (bindgen).
          # Host-side installs aren't visible to the container.
          # protoc is downloaded as a binary so package-name drift
          # between manylinux_2_28 (AlmaLinux) and musllinux_1_2
          # (Alpine) doesn't bite us.
          before-script-linux: |
            set -euo pipefail
            if command -v dnf >/dev/null; then
              dnf install -y clang
            elif command -v yum >/dev/null; then
              yum install -y clang
            elif command -v apk >/dev/null; then
              apk add --no-cache clang-dev curl unzip
            fi
            PROTOC_VERSION=28.3
            case "$(uname -m)" in
              x86_64)  PROTOC_ARCH=linux-x86_64 ;;
              aarch64) PROTOC_ARCH=linux-aarch_64 ;;
              *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
            esac
            curl -fsSL -o /tmp/protoc.zip \
              "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip"
            unzip -o /tmp/protoc.zip -d /usr/local
            rm /tmp/protoc.zip
            protoc --version

      - name: Attest wheel provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "python/dist/*.whl"

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-linux-${{ matrix.libc }}-${{ matrix.arch }}
          path: python/dist/*.whl
          if-no-files-found: error

  build-macos:
    name: Build wheel (macos ${{ matrix.arch }})
    needs: build-wasm

    runs-on: macos-14
    permissions:
      contents: read       # checkout sources
      id-token: write      # OIDC for Sigstore signing via attest-build-provenance
      attestations: write  # publish SLSA provenance to repo attestation log

    strategy:
      fail-fast: true
      matrix:
        include:
          # maturin-action defaults MACOSX_DEPLOYMENT_TARGET to 10.12
          # for x86_64, but rocksdb's C++ uses std::variant which the
          # libc++ headers gate to 10.13+. Bump explicitly.
          - target: x86_64-apple-darwin
            arch: x86_64
            deployment-target: "10.13"
          - target: aarch64-apple-darwin
            arch: arm64
            deployment-target: "11.0"

    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment-target }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set release version
        uses: ./.github/actions/set-release-version
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Download WASM bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rivers-ui-pkg
          path: rust/rivers-ui/pkg/

      # rivers-api's prost-build invokes protoc at build time.
      - name: Install protoc
        run: brew install protobuf

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: false

      - name: Attest wheel provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "python/dist/*.whl"

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-macos-${{ matrix.arch }}
          path: python/dist/*.whl
          if-no-files-found: error

  build-windows:
    name: Build wheel (windows ${{ matrix.arch }})
    needs: build-wasm
    runs-on: windows-latest
    permissions:
      contents: read       # checkout sources
      id-token: write      # OIDC for Sigstore signing via attest-build-provenance
      attestations: write  # publish SLSA provenance to repo attestation log

    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x86_64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        # windows-latest defaults to pwsh; the bash parameter expansion
        # for ${REF_NAME#v} needs an explicit shell pin.
        shell: bash
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set release version
        uses: ./.github/actions/set-release-version
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Download WASM bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rivers-ui-pkg
          path: rust/rivers-ui/pkg/

      # surrealdb-librocksdb-sys's bindgen build script needs libclang.dll.
      # windows-latest ships LLVM preinstalled, but bindgen can't find it
      # unless LIBCLANG_PATH is set explicitly.
      - name: Expose preinstalled libclang to bindgen
        shell: bash
        run: echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"

      # rivers-api's prost-build invokes protoc at build time.
      - name: Install protoc
        run: choco install protoc -y --no-progress

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: false

      - name: Attest wheel provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "python/dist/*.whl"

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-windows-${{ matrix.arch }}
          path: python/dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # PyPI Trusted Publishing exchanges OIDC for upload token

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: "wheel-*"
          merge-multiple: true

      - name: List dist
        run: ls -la dist

      # Trusted publishing is handled by PyO3/maturin-action itself:
      # given `id-token: write` it exchanges the OIDC token for a PyPI
      # publish token and sets MATURIN_PYPI_TOKEN. No CLI flag needed —
      # `maturin upload` (1.13) does not accept --trusted-publishing.
      - name: Publish to PyPI
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
