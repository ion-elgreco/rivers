apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.executor.serviceAccountName }}
  namespace: {{ include "rivers.namespace" . }}
  labels:
    {{- include "rivers.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rivers-executor
  namespace: {{ include "rivers.namespace" . }}
  labels:
    {{- include "rivers.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rivers.io"]
    resources: ["runs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["rivers.io"]
    resources: ["runs/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["rivers.io"]
    resources: ["codelocations"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rivers-executor
  namespace: {{ include "rivers.namespace" . }}
  labels:
    {{- include "rivers.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rivers-executor
subjects:
  - kind: ServiceAccount
    name: {{ .Values.executor.serviceAccountName }}
    namespace: {{ include "rivers.namespace" . }}
