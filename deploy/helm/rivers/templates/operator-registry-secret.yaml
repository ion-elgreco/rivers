{{- /*
  Bearer token for CodeLocationRegistry gRPC auth. Generated on first
  install via `randAlphaNum`; preserved across upgrades via a `lookup` so
  rolling the chart doesn't invalidate the UI's credentials. To rotate,
  delete this Secret and redeploy.
*/ -}}
{{- $existing := (lookup "v1" "Secret" (include "rivers.namespace" .) "rivers-registry-token") -}}
{{- $token := "" -}}
{{- if and $existing $existing.data (index $existing.data "token") -}}
  {{- $token = index $existing.data "token" -}}
{{- else -}}
  {{- $token = randAlphaNum 48 | b64enc -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: rivers-registry-token
  namespace: {{ include "rivers.namespace" . }}
  labels:
    app.kubernetes.io/name: rivers-operator
    {{- include "rivers.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ $token }}
