{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rivers-ui
  namespace: {{ include "rivers.namespace" . }}
  labels:
    app.kubernetes.io/name: rivers-ui
    {{- include "rivers.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rivers-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rivers-ui
        # NetworkPolicy on the operator registry service allows ingress only
        # from pods carrying this label (see operator-registry-networkpolicy).
        rivers.io/role: registry-client
        {{- include "rivers.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.surrealdb.enabled }}
      initContainers:
        {{- include "rivers.surrealReadinessInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ .Values.ui.image | default (include "rivers.uiImage" .) }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          imagePullPolicy: {{ .Values.ui.imagePullPolicy }}
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "{{ .Values.ui.port }}"
            - "--surreal-endpoint"
            - {{ include "rivers.surrealEndpoint" . | quote }}
            - "--registry-url"
            - "http://rivers-operator-registry.{{ include "rivers.namespace" . }}.svc:{{ .Values.operator.registry.port }}"
          env:
            - name: RIVERS_REGISTRY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rivers-registry-token
                  key: token
            {{- include "rivers.surrealEnv" . | nindent 12 }}
          ports:
            - containerPort: {{ .Values.ui.port }}
              name: http
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            # Default 1s is too tight on k3d/CNI hiccups — the app
            # answers in ~15ms but the kubelet→pod probe still times
            # out and flaps the pod between Ready and NotReady.
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: rivers-ui
  namespace: {{ include "rivers.namespace" . }}
  labels:
    app.kubernetes.io/name: rivers-ui
    {{- include "rivers.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ui.serviceType }}
  ports:
    - port: {{ .Values.ui.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: rivers-ui
{{- end }}
