{{- /*
Bootstrap (root) credentials for the bundled SurrealDB pod. Only the bundled
DB and the post-install Job ever read this Secret — rivers itself signs in
as the database-scoped user from `rivers-surrealdb-auth` (or the user-
supplied existingSecret).

Generated whenever the bundled DB is in use. Password auto-generates on
first install via `randAlphaNum 32`; on `helm upgrade` the existing Secret
value is preserved via `lookup` so the bundled pod's root user doesn't
rotate out from under itself.
*/ -}}
{{- if .Values.surrealdb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rivers.surrealBootstrapSecretName" . }}
  namespace: {{ include "rivers.namespace" . }}
  labels:
    app.kubernetes.io/name: rivers-surrealdb-bootstrap
    {{- include "rivers.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  username: {{ .Values.surrealdb.auth.bootstrap.username | quote }}
  password: {{ include "rivers.surrealBootstrapPassword" . | quote }}
{{- end }}
