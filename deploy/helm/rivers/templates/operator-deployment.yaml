{{- include "rivers.validateSurrealAuth" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rivers-operator
  namespace: {{ include "rivers.namespace" . }}
  labels:
    app.kubernetes.io/name: rivers-operator
    {{- include "rivers.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rivers-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rivers-operator
        {{- include "rivers.labels" . | nindent 8 }}
    spec:
      serviceAccountName: rivers-operator
      securityContext:
        # Match the rivers-operator image's USER (distroless `nonroot`, UID 65532).
        # fsGroup is required so the webhook-cert Secret (defaultMode 0440)
        # becomes group-readable to the operator process — without it the
        # webhook serving cert is unreadable and admission never starts.
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.surrealdb.enabled }}
      initContainers:
        {{- include "rivers.surrealReadinessInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          image: {{ .Values.operator.image | default (include "rivers.operatorImage" .) }}
          imagePullPolicy: {{ .Values.operator.imagePullPolicy }}
          ports:
            - containerPort: 9090
              name: metrics
            - containerPort: {{ .Values.operator.registry.port }}
              name: registry
            - containerPort: {{ .Values.operator.webhook.port }}
              name: webhook
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RIVERS_NAMESPACE
              value: {{ include "rivers.namespace" . }}
            {{- include "rivers.surrealEnv" . | nindent 12 }}
            - name: RIVERS_CODE_LOCATION_SERVICE_ACCOUNT
              value: {{ .Values.executor.serviceAccountName | quote }}
            - name: RIVERS_METRICS_ADDR
              value: "0.0.0.0:9090"
            - name: RIVERS_REGISTRY_ADDR
              value: "0.0.0.0:{{ .Values.operator.registry.port }}"
            - name: RIVERS_REGISTRY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rivers-registry-token
                  key: token
            - name: RIVERS_WEBHOOK_ADDR
              value: "0.0.0.0:{{ .Values.operator.webhook.port }}"
            - name: RIVERS_WEBHOOK_CERT_DIR
              value: /etc/webhook-cert
            {{- if .Values.operator.allowInsecureRegistry }}
            - name: RIVERS_ALLOW_INSECURE_REGISTRY
              value: "true"
            {{- end }}
            - name: RUST_LOG
              value: "info"
          readinessProbe:
            httpGet:
              # /readyz on the webhook port stays 503 until the CodeLocation
              # informer has completed its initial list. Required so the API
              # server's Endpoints manager keeps un-synced replicas out of the
              # webhook Service — otherwise a follower could manufacture
              # spurious "codeLocation not found" rejections under
              # failurePolicy: Fail.
              path: /readyz
              port: webhook
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          volumeMounts:
            - name: webhook-cert
              mountPath: /etc/webhook-cert
              readOnly: true
      volumes:
        # Webhook serving cert. Provisioned by operator-webhook.yaml — either
        # generated by Helm (selfSigned mode) or by cert-manager (certManager
        # mode). Either way the Secret is `kubernetes.io/tls` with `tls.crt`
        # / `tls.key`; the operator reload loop picks up rotations without
        # a restart.
        - name: webhook-cert
          secret:
            secretName: rivers-operator-webhook-cert
            defaultMode: 0440
