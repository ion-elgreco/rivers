{{- /*
Pre-rendered SurrealQL file applied by the user-init Job to define the
rivers namespace/database/user. Stored as a Secret (not ConfigMap) because
it contains the rivers user's password inline — and the password is sourced
from the same helper as the auth Secret, so both stay in lock-step.
*/ -}}
{{- if .Values.surrealdb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: rivers-surrealdb-setup
  namespace: {{ include "rivers.namespace" . }}
  labels:
    app.kubernetes.io/name: rivers-surrealdb-setup
    {{- include "rivers.labels" . | nindent 4 }}
type: Opaque
stringData:
  # `OPTION IMPORT;` is required by SurrealDB v3's `surreal import` HTTP
  # endpoint — disables side-effects/live queries for bulk apply. Without
  # it the server rejects the request with HTTP 400.
  setup.surql: |
    OPTION IMPORT;
    DEFINE NAMESPACE IF NOT EXISTS `{{ .Values.surrealdb.auth.namespace }}`;
    USE NS `{{ .Values.surrealdb.auth.namespace }}`;
    DEFINE DATABASE IF NOT EXISTS `{{ .Values.surrealdb.auth.database }}`;
    USE NS `{{ .Values.surrealdb.auth.namespace }}` DB `{{ .Values.surrealdb.auth.database }}`;
    DEFINE USER OVERWRITE `{{ include "rivers.surrealRiversUsername" . }}` ON DATABASE PASSWORD '{{ include "rivers.surrealRiversPassword" . }}' ROLES OWNER;
{{- end }}
