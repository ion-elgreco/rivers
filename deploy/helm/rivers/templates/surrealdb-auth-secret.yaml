{{- /*
Chart-managed Secret for the SurrealDB rivers user. Materialised whenever
auth is requested AND the user did NOT provide an existingSecret —
production callers should supply `surrealdb.auth.existingSecret` and skip
this template entirely.

Username defaults to "rivers"; password is `randAlphaNum 32` on first install
and preserved across upgrades via `lookup` (see _helpers.tpl).
*/ -}}
{{- include "rivers.validateSurrealAuth" . -}}
{{- if and (include "rivers.surrealAuthRequested" .) (not .Values.surrealdb.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rivers.surrealAuthSecretName" . }}
  namespace: {{ include "rivers.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "rivers.surrealAuthSecretName" . }}
    {{- include "rivers.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  {{ .Values.surrealdb.auth.secretKeys.username }}: {{ include "rivers.surrealRiversUsername" . | quote }}
  {{ .Values.surrealdb.auth.secretKeys.password }}: {{ include "rivers.surrealRiversPassword" . | quote }}
{{- end }}
