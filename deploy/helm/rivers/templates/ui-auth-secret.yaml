{{/*
Chart-managed session-cookie key for OIDC mode: generated on first install,
preserved across upgrades via `lookup`, skipped when the user brings their
own Secret. Forward mode sets no cookies.
*/}}
{{- if and .Values.ui.enabled (eq .Values.ui.auth.mode "oidc") (not .Values.ui.auth.cookieSecret.existingSecret) }}
{{- include "rivers.validateUiAuth" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rivers.uiAuthCookieSecretName" . }}
  namespace: {{ include "rivers.namespace" . }}
  labels:
    app.kubernetes.io/name: rivers-ui
    {{- include "rivers.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.ui.auth.cookieSecret.secretKey }}: {{ include "rivers.uiAuthCookieSecretValue" . | quote }}
{{- end }}
